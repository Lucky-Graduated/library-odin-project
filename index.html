<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Library Odin Project</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
		<div class="heading">
			<h1>Library Odin</h1>
			<p>
			  Build your personal collection by adding books you want to read or have
			  already completed, and show off your library digitally.
			</p>
		</div>
      <div class="search-area">
        <div class="input">
          <input type="text" id="search" placeholder="Book name" />
          <input type="text" id="search" placeholder="Author's name" />
          <input
            type="text"
            id="search"
            placeholder="Description of the book"
          />
          <div class="add">
            <button>Add</button>
          </div>
        </div>

	</div>
	<div class="card-container">
	  <div class="card">
		<div class="image">
		  <div class="read">
			<input type="checkbox" />
		  </div>
		  <img
			src="https://imgs.search.brave.com/UxnRPIadxrrPkM0rGOlD-5SrzTt7ZzpfV_8ETFijkjw/rs:fit:860:0:0:0/g:ce/aHR0cHM6Ly9ydWtt/aW5pbTIuZmxpeGNh/cnQuY29tL2ltYWdl/LzI4MC8zNzAveGlm/MHEvYm9vay93L3gv/cS8xOTg0LW9yaWdp/bmFsLWltYWhqcjY2/NmVuZzJhZ2QuanBl/Zz9xPTkw"
			alt="1984"
		  />
		</div>
		<div class="info">
		  <h5 id="name">Name:</h5>
		  <h5 id="name">Author:</h5>
		  <h5 id="name">Description:</h5>
		</div>
	  </div>
	</div>
    </div>
  </body>
</html>
