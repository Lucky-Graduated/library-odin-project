<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Library Odin Project</title>
    <link rel="stylesheet" href="style.css" />
	<script src="script.js" defer></script>
  </head>
  <body>
    <div class="container">
		<div class="heading">
			<h1>Library Odin</h1>
			<p>
			  Build your personal collection by adding books you want to read or have
			  already completed, and show off your library digitally.
			</p>
		</div>
      <div class="search-area">
        <div class="input">
          <input type="text" class="search" placeholder="Image location" />
          <input type="text" class="search" placeholder="Book name" />
          <input type="text" class="search" placeholder="Author's name" />
          <input
            type="text"
            class="search"
            placeholder="Description of the book"
          />
          <div class="add">
            <button>Add</button>
          </div>
        </div>

	</div>
	<div class="card-container">
	</div> 
    </div>
  </body>
</html>
